name: reclassify

# Re-runs the classifier against the existing corpus when the curated phrase
# list (config/complaint_phrases.json) changes. The cron's incremental run
# only sees NEW records; if you change the phrase list, old weeks should
# reflect the new list too — that's this workflow.
#
# Triggers:
#   - push to main affecting config/complaint_phrases.json
#   - workflow_dispatch (manual)
#
# No scraping. Just restore corpus from the cron's cache, re-classify, push
# data.json. If the cache has been evicted (>7 days no cron), this will
# produce empty data.json — caught by --strict.

on:
  push:
    branches: [main]
    paths:
      - "config/complaint_phrases.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  reclassify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -e .

      - name: Restore corpus cache
        uses: actions/cache@v4
        with:
          path: corpus
          key: corpus-v1-reclassify-${{ github.run_id }}
          restore-keys: |
            corpus-v1-

      - name: Fail loudly if corpus is empty
        run: |
          if ! find corpus -name '*.ndjson' | grep -q .; then
            echo "::error::corpus cache empty — cannot reclassify. Trigger refresh.yml first to repopulate."
            exit 1
          fi

      - name: Classify (strict)
        run: |
          python scripts/v0_classify.py --strict --out data.json

      - name: Commit data.json
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json unchanged — phrase-list edit had no effect on corpus."
            exit 0
          fi
          git commit -m "data: reclassify after phrase-list change [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
